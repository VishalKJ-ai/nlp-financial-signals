# =============================================================================
# NLP Financial Signals Pipeline — Automated Analysis
# =============================================================================
#
# Runs the NLP pipeline on a monthly schedule and on manual dispatch.
# Uses sample data mode to avoid requiring web access in CI.
# Updated signal outputs and figures are committed back to the repo.

name: Monthly Analysis

on:
  schedule:
    # First day of each month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: false
        default: "sample"
        type: choice
        options:
          - sample
          - full

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NLP pipeline
        run: |
          python -m src.pipeline --mode ${{ github.event.inputs.mode || 'sample' }}
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/figures/ outputs/signals/
          git diff --staged --quiet || git commit -m "chore: update analysis outputs [automated]"
          git push
