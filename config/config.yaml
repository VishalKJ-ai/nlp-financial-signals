# NLP Financial Signals Pipeline Configuration
# =============================================

# Data collection settings
data:
  sources:
    boe:
      speeches_url: "https://www.bankofengland.co.uk/news/speeches"
      minutes_url: "https://www.bankofengland.co.uk/monetary-policy-summary-and-minutes"
      max_pages: 50
    fed:
      speeches_url: "https://www.federalreserve.gov/newsevents/speeches.htm"
      minutes_url: "https://www.federalreserve.gov/monetarypolicy/fomcminutes.htm"
      max_pages: 50
    ecb:
      speeches_url: "https://www.ecb.europa.eu/press/key/html/index.en.html"
      minutes_url: "https://www.ecb.europa.eu/press/accounts/html/index.en.html"
      max_pages: 50
  date_range:
    start: "2015-01-01"
    end: "2025-12-31"
  rate_limit_seconds: 1.5
  max_retries: 3
  timeout_seconds: 30
  paths:
    raw: "data/raw"
    processed: "data/processed"
    sample: "data/sample"

# Text preprocessing parameters
preprocessing:
  min_doc_length: 100         # Minimum characters after cleaning
  max_doc_length: 50000       # Maximum characters per document
  chunk_size: 512             # Tokens per chunk for long documents
  chunk_overlap: 64           # Token overlap between chunks
  remove_boilerplate: true    # Strip headers, footers, disclaimers
  lowercase: false            # FinBERT expects cased text

# BERTopic configuration
topics:
  embedding_model: "all-MiniLM-L6-v2"
  nr_topics: "auto"           # Let HDBSCAN determine cluster count
  min_topic_size: 10          # Minimum documents per topic
  umap:
    n_neighbors: 15
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
    random_state: 42
  hdbscan:
    min_cluster_size: 10
    min_samples: 5
    metric: "euclidean"
    cluster_selection_method: "eom"
  top_n_words: 10             # Words per topic representation
  calculate_probabilities: true
  verbose: true

# FinBERT sentiment analysis
sentiment:
  model_name: "ProsusAI/finbert"
  max_length: 512
  batch_size: 32
  device: "auto"              # "auto", "cpu", or "cuda"
  aggregation: "paragraph"    # "document" or "paragraph"

# Financial signal extraction
signals:
  composite_weights:
    topic_shift: 0.3          # Weight for topic distribution changes
    sentiment_level: 0.4      # Weight for absolute sentiment
    sentiment_change: 0.3     # Weight for sentiment momentum
  smoothing_window: 3         # Rolling average window (months)
  hawkish_threshold: 0.3      # Sentiment > threshold => hawkish
  dovish_threshold: -0.3      # Sentiment < threshold => dovish
  market_tickers:
    - "^GSPC"                 # S&P 500
    - "^FTSE"                 # FTSE 100
    - "^STOXX50E"             # Euro Stoxx 50

# Evaluation parameters
evaluation:
  coherence_measures: ["c_v", "c_npmi"]
  topic_count_range: [5, 30]  # Grid search for optimal topic count
  correlation_lags: [0, 1, 3, 6]  # Months lag for market correlation

# Output paths
output:
  figures_dir: "outputs/figures"
  signals_dir: "outputs/signals"
  models_dir: "models"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
